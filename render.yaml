services:
  # 1. Base de Datos PostgreSQL
  - type: db
    name: consultorio-db
    databaseName: consultorio_medico
    user: consultorio_user
    plan: free

  # 2. Web Service para el Backend (Node.js)
  - type: web
    name: consultorio-backend
    env: node
    plan: free # Puedes cambiarlo a starter para que no se "duerma"
    region: ohio
    rootDir: server
    buildCommand: npm install
    startCommand: npm run db:init && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: consultorio-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: FRONTEND_URL
        value: https://consultorio-frontend.onrender.com # Ajustar según tu URL final
      - key: CORS_ORIGIN
        value: https://consultorio-frontend.onrender.com # Ajustar según tu URL final
      # Claves de Google y SMTP (deberás ponerlas en el dashboard de Render)
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false

  # 3. Static Site para el Frontend (React)
  - type: web
    name: consultorio-frontend
    env: static
    plan: free
    region: ohio
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_BASE_URL
        fromService:
          type: web
          name: consultorio-backend
          property: host
      - key: CI
        value: false
